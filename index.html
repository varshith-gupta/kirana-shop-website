<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahesh Kirana & Xerox</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans Telugu', sans-serif;
}

body{
background:#ffffff;
color:#333;
line-height:1.6;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:1000;
}

nav h2{
color:#2e7d32;
font-weight:700;
font-size:20px;
}

nav button{
background:#2e7d32;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

/* HERO */
.hero{
background:#f1f8f4;
padding:100px 8%;
text-align:center;
}

.hero h1{
font-size:34px;
color:#2e7d32;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#555;
margin-bottom:30px;
}

.hero-buttons a{
display:inline-block;
padding:12px 24px;
margin:8px;
border-radius:6px;
text-decoration:none;
font-weight:600;
}

.call-btn{
background:#2e7d32;
color:white;
}

.whatsapp-btn{
background:#25D366;
color:white;
}

/* SECTION */
section{
padding:70px 8%;
}

section h2{
text-align:center;
font-size:26px;
margin-bottom:40px;
color:#2e7d32;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
border:1px solid #eee;
}

/* GALLERY */
.gallery{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.gallery img{
width:320px;
border-radius:10px;
}

/* MAP */
.map iframe{
width:100%;
height:350px;
border-radius:10px;
border:none;
}

/* FOOTER */
footer{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
}

@media(max-width:768px){
.hero h1{font-size:24px;}
.gallery img{width:100%;}
}
</style>
</head>

<body>

<nav>
<h2>Mahesh Kirana & Xerox</h2>
<button onclick="toggleLanguage()" id="langBtn">English</button>
</nav>

<div class="hero">
<h1 id="title"></h1>
<p id="subtitle"></p>

<div class="hero-buttons">
<a href="tel:9640695662" class="call-btn" id="callBtn"></a>
<a href="https://wa.me/919640695662" target="_blank" class="whatsapp-btn" id="whatsappBtn"></a>
</div>
</div>

<!-- SERVICES -->
<section>
<h2 id="servicesTitle"></h2>

<div class="grid">

<div class="card"><h3 id="s1Title"></h3><p id="s1Desc"></p></div>
<div class="card"><h3 id="s2Title"></h3><p id="s2Desc"></p></div>
<div class="card"><h3 id="s3Title"></h3><p id="s3Desc"></p></div>
<div class="card"><h3 id="s4Title"></h3><p id="s4Desc"></p></div>
<div class="card"><h3 id="s5Title"></h3><p id="s5Desc"></p></div>
<div class="card"><h3 id="s6Title"></h3><p id="s6Desc"></p></div>
<div class="card"><h3 id="s7Title"></h3><p id="s7Desc"></p></div>
<div class="card"><h3 id="s8Title"></h3><p id="s8Desc"></p></div>

</div>
</section>

<!-- GALLERY -->
<section>
<h2 id="photosTitle"></h2>
<div class="gallery">
<img src="shop_front_photo.jpg">
<img src="shop.jpg">
</div>
</section>

<!-- LOCATION -->
<section class="map">
<h2 id="contactTitle"></h2>

<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3794.2946667280107!2d83.08162759999999!3d18.011523500000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a3bd9c9ccec4d1d%3A0x17992d1d0137f734!2sMahesh%20Kirana%20%26%20Xerox!5e0!3m2!1sen!2sin!4v1772531721855!5m2!1sen!2sin"></iframe>

</section>

<footer>
<p id="footerText"></p>
</footer>

<script>

callBtn:"📞 కాల్ చేయండి",

s3:"మొబైల్ రీచార్జ్", s3d:"ఎయిర్టెల్, జియో, VI.",
s4:"కరెంట్ బిల్ చెల్లింపు", s4d:"విద్యుత్ బిల్లు.",

servicesTitle:"Our Services",

function updateLanguage(lang){
for(let key in content[lang]){
if(document.getElementById(key)){
document.getElementById(key).innerText = content[lang][key];
}
}
document.getElementById("langBtn").innerText = lang==="telugu" ? "English" : "తెలుగు";
}

function toggleLanguage(){
isTelugu = !isTelugu;
updateLanguage(isTelugu?"telugu":"english");
}

window.onload=function(){
updateLanguage("telugu");
};

</script>

</body>
</html>
