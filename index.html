<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahesh Kirana & Xerox</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans Telugu',sans-serif;
scroll-behavior:smooth;
}

body{
background:#ffffff;
color:#333;
line-height:1.6;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
border-bottom:1px solid #eee;
background:white;
position:sticky;
top:0;
z-index:1000;
}

nav h2{color:#2e7d32;}

nav button{
background:#2e7d32;
color:white;
border:none;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
}

.hero{
background:#f1f8f4;
padding:90px 8%;
text-align:center;
}

.hero h1{
font-size:32px;
color:#2e7d32;
margin-bottom:10px;
}

.hero p{margin-bottom:20px;}

.hero a{
display:inline-block;
margin:6px;
padding:10px 22px;
border-radius:6px;
text-decoration:none;
color:white;
font-weight:600;
}

.call-btn{background:#2e7d32;}
.whatsapp-btn{background:#25D366;}

section{
padding:60px 8%;
}

section h2{
text-align:center;
color:#2e7d32;
margin-bottom:30px;
font-size:24px;
}

.card{
background:#fafafa;
border:1px solid #eee;
padding:18px;
border-radius:8px;
max-width:600px;
margin:10px auto;
}

.gallery{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.gallery img{
width:300px;
border-radius:8px;
}

.map iframe{
width:100%;
height:350px;
border:none;
border-radius:8px;
}

footer{
background:#2e7d32;
color:white;
text-align:center;
padding:15px;
font-size:14px;
}
</style>
</head>

<body>

<nav>
<h2>Mahesh Kirana & Xerox</h2>
<button onclick="toggleLanguage()" id="langBtn">English</button>
</nav>

<div class="hero">
<h1 id="title"></h1>
<p id="subtitle"></p>

<a href="tel:9640695662" class="call-btn" id="callBtn"></a>
<a href="https://wa.me/919640695662" class="whatsapp-btn" id="whatsappBtn"></a>
</div>

<!-- SERVICES -->
<section>
<h2 id="servicesTitle"></h2>
<div class="card" id="servicesList"></div>
</section>

<!-- GROCERIES -->
<section>
<h2 id="groceryTitle"></h2>
<div class="card" id="groceryList"></div>
</section>

<!-- VEGETABLES -->
<section>
<h2 id="vegTitle"></h2>
<div class="card" id="vegList"></div>
</section>

<!-- DRY FRUITS -->
<section>
<h2 id="dryTitle"></h2>
<div class="card" id="dryList"></div>
</section>

<!-- STATIONERY -->
<section>
<h2 id="stationeryTitle"></h2>
<div class="card" id="stationeryList"></div>
</section>

<!-- PUJA -->
<section>
<h2 id="pujaTitle"></h2>
<div class="card" id="pujaList"></div>
</section>

<!-- DRINKS -->
<section>
<h2 id="drinkTitle"></h2>
<div class="card" id="drinkList"></div>
</section>

<!-- GALLERY -->
<section>
<h2 id="photoTitle"></h2>
<div class="gallery">
<img src="shop_front_photo.jpg">
<img src="shop.jpg">
</div>
</section>

<!-- LOCATION -->
<section class="map">
<h2 id="contactTitle"></h2>
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3794.2946667280107!2d83.08162759999999!3d18.011523500000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a3bd9c9ccec4d1d%3A0x17992d1d0137f734!2sMahesh%20Kirana%20%26%20Xerox!5e0!3m2!1sen!2sin!4v1772531721855!5m2!1sen!2sin"></iframe>
</section>

<footer>
<p id="footerText"></p>
</footer>

document.getElementById("servicesList").innerText="జిరాక్స్, లామినేషన్, మొబైల్ రీచార్జ్, కరెంట్ బిల్ చెల్లింపు.";

function setEnglish(){
document.getElementById("title").innerText="Mahesh Kirana & Xerox";
document.getElementById("subtitle").innerText="Trusted Services Since 2005";
document.getElementById("servicesTitle").innerText="Our Services";
document.getElementById("groceryTitle").innerText="Groceries";
document.getElementById("vegTitle").innerText="Fresh Vegetables";

}

function toggleLanguage(){

else{setTelugu();isTelugu=true;}
}

window.onload=setTelugu;

</script>

</body>
</html>
