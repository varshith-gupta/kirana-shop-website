<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahesh Kirana & Xerox</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans Telugu', sans-serif;
}

body{
background:#ffffff;
color:#333;
line-height:1.6;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:1000;
}

nav h2{
color:#2e7d32;
font-weight:700;
font-size:20px;
}

nav button{
background:#2e7d32;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

/* HERO */
.hero{
background:#f1f8f4;
padding:100px 8%;
text-align:center;
}

.hero h1{
font-size:34px;
color:#2e7d32;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#555;
margin-bottom:30px;
}

.hero-buttons a{
display:inline-block;
padding:12px 24px;
margin:8px;
border-radius:6px;
text-decoration:none;
font-weight:600;
}

.call-btn{
background:#2e7d32;
color:white;
}

.whatsapp-btn{
background:#25D366;
color:white;
}

/* SECTION */
section{
padding:70px 8%;
}

section h2{
text-align:center;
font-size:26px;
margin-bottom:40px;
color:#2e7d32;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
border:1px solid #eee;
}

/* GALLERY */
.gallery{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.gallery img{
width:320px;
border-radius:10px;
}

/* MAP */
.map iframe{
width:100%;
height:350px;
border-radius:10px;
border:none;
}

/* FOOTER */
footer{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
}

@media(max-width:768px){
.hero h1{font-size:24px;}
.gallery img{width:100%;}
}

</style>
</head>

<body>

<nav>
<h2>Mahesh Kirana & Xerox</h2>
<button onclick="toggleLanguage()" id="langBtn">English</button>
</nav>

<div class="hero">
<h1 id="title"></h1>
<p id="subtitle"></p>

<div class="hero-buttons">
<a href="tel:9640695662" class="call-btn" id="callBtn"></a>
<a href="https://wa.me/919640695662" target="_blank" class="whatsapp-btn" id="whatsappBtn"></a>
</div>
</div>

<section>
<h2 id="servicesTitle"></h2>

<div class="grid">
<div class="card">
<h3 id="s1Title"></h3>
<p id="s1Desc"></p>
</div>

<div class="card">
<h3 id="s2Title"></h3>
<p id="s2Desc"></p>
</div>

<div class="card">
<h3 id="s3Title"></h3>
<p id="s3Desc"></p>
</div>

<div class="card">
<h3 id="s4Title"></h3>
<p id="s4Desc"></p>
</div>

<div class="card">
<h3 id="s5Title"></h3>
<p id="s5Desc"></p>
</div>

<div class="card">
<h3 id="s6Title"></h3>
<p id="s6Desc"></p>
</div>
</div>
</section>

<section>
<h2 id="photosTitle"></h2>
<div class="gallery">
<img src="shop_front_photo.jpg.jpeg">
<img src="shop.jpg.jpeg">
</div>
</section>

<section class="map">
<h2 id="contactTitle"></h2>

<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3794.2946667280107!2d83.08162759999999!3d18.011523500000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a3bd9c9ccec4d1d%3A0x17992d1d0137f734!2sMahesh%20Kirana%20%26%20Xerox!5e0!3m2!1sen!2sin!4v1772531721855!5m2!1sen!2sin"></iframe>

</section>

<footer>
<p id="footerText"></p>
</footer>

<script>

let isTelugu = true;

const content = {
  telugu: {
    title: "మహేష్ కిరాణా & జిరాక్స్",
    subtitle: "2005 నుండి సేవలో – గ్రామ సచివాలయం ఎదురుగా",
    servicesTitle: "మా సేవలు",
    photosTitle: "దుకాణ ఫోటోలు",
    contactTitle: "మా స్థానం",
    callBtn: "📞 కాల్ చేయండి",
    whatsappBtn: "💬 వాట్సాప్",
    footer: "© 2005 - 2026 మహేష్ కిరాణా & జిరాక్స్",

    s1: "జిరాక్స్ సేవలు",
    s1d: "బ్లాక్ & వైట్ ప్రింటింగ్.",
    s2: "లామినేషన్",
    s2d: "పత్రాల రక్షణ.",
    s3: "మొబైల్ రీచార్జ్",
    s3d: "ఎయిర్టెల్, జియో, VI.",
    s4: "కరెంట్ బిల్ చెల్లింపు",
    s4d: "విద్యుత్ బిల్లు.",
    s5: "పూజా సామగ్రి",
    s5d: "అగర్బత్తి, కర్పూరం.",
    s6: "కూల్ డ్రింక్స్",
    s6d: "శీతల పానీయాలు."
  },

  english: {
    title: "Mahesh Kirana & Xerox",
    subtitle: "Since 2005 – Opposite Grama Sachivalayam",
    servicesTitle: "Our Services",
    photosTitle: "Shop Photos",
    contactTitle: "Our Location",
    callBtn: "📞 Call",
    whatsappBtn: "💬 WhatsApp",
    footer: "© 2005 - 2026 Mahesh Kirana & Xerox",

    s1: "Xerox Services",
    s1d: "Black & White Printing.",
    s2: "Lamination",
    s2d: "Document Protection.",
    s3: "Mobile Recharge",
    s3d: "Airtel, Jio, VI available.",
    s4: "Electricity Bill Payment",
    s4d: "Quick Bill Payment.",
    s5: "Puja Items",
    s5d: "Agarbatti, Camphor.",
    s6: "Cold Drinks",
    s6d: "Cool beverages available."
  }
};

function updateLanguage(lang) {
  document.getElementById("title").innerText = content[lang].title;
  document.getElementById("subtitle").innerText = content[lang].subtitle;
  document.getElementById("servicesTitle").innerText = content[lang].servicesTitle;
  document.getElementById("photosTitle").innerText = content[lang].photosTitle;
  document.getElementById("contactTitle").innerText = content[lang].contactTitle;
  document.getElementById("callBtn").innerText = content[lang].callBtn;
  document.getElementById("whatsappBtn").innerText = content[lang].whatsappBtn;
  document.getElementById("footerText").innerText = content[lang].footer;

  document.getElementById("s1Title").innerText = content[lang].s1;
  document.getElementById("s1Desc").innerText = content[lang].s1d;
  document.getElementById("s2Title").innerText = content[lang].s2;
  document.getElementById("s2Desc").innerText = content[lang].s2d;
  document.getElementById("s3Title").innerText = content[lang].s3;
  document.getElementById("s3Desc").innerText = content[lang].s3d;
  document.getElementById("s4Title").innerText = content[lang].s4;
  document.getElementById("s4Desc").innerText = content[lang].s4d;
  document.getElementById("s5Title").innerText = content[lang].s5;
  document.getElementById("s5Desc").innerText = content[lang].s5d;
  document.getElementById("s6Title").innerText = content[lang].s6;
  document.getElementById("s6Desc").innerText = content[lang].s6d;

  document.getElementById("langBtn").innerText = lang === "telugu" ? "English" : "తెలుగు";
}

function toggleLanguage(){
  isTelugu = !isTelugu;
  updateLanguage(isTelugu ? "telugu" : "english");
}

window.onload = function(){
  updateLanguage("telugu");
};

</script>

</body>
</html>
